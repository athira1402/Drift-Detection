---
- name: Install prerequisite packages
  apt:
    name: [apt-transport-https, ca-certificates, curl, gnupg, lsb-release]
    update_cache: yes
    cache_valid_time: 3600 # Don't update if it was updated in the last hour
  register: apt_res
  until: apt_res is success
  retries: 5
  delay: 10

- name: Add Docker GPG key
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Add Docker Repository
  apt_repository:
    # Using ansible_facts as recommended by the warning
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable"
    state: present
    filename: docker-ansible  # Gives it a unique filename to avoid conflicts

- name: Install Docker Engine
  apt:
    name: [docker-ce, docker-ce-cli, containerd.io, docker-compose-plugin]
    update_cache: yes

- name: Ensure Jenkins user is in Docker group
  user:
    name: jenkins
    groups: docker
    append: yes
  notify: Restart Docker