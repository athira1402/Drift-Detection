apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-training
spec:
  replicas: 1
  selector:
    matchLabels:
      app: model-training
  template:
    metadata:
      labels:
        app: model-training
    spec:
      containers:
      - name: model-training
        image: your-dockerhub-username/model_training:latest
        ports:
        - containerPort: 5001
